var PLAYING=false;
function spk(txt,lang){
  if(!window.speechSynthesis)return;
  lang=lang||'en-US';
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(txt);
  u.lang=lang;u.rate=0.84;u.pitch=1.0;u.volume=1.0;
  var vs=window.speechSynthesis.getVoices();
  var v=null;
  for(var i=0;i<vs.length;i++){if(vs[i].lang===lang&&vs[i].name.indexOf('Google')>=0){v=vs[i];break;}}
  if(!v)for(var i=0;i<vs.length;i++){if(vs[i].lang===lang){v=vs[i];break;}}
  if(!v)for(var i=0;i<vs.length;i++){if(vs[i].lang.indexOf(lang.split('-')[0])===0){v=vs[i];break;}}
  if(v)u.voice=v;
  window.speechSynthesis.speak(u);
}
function playAll(lines,lang){
  lang=lang||'en-US';
  if(PLAYING){
    window.speechSynthesis.cancel();
    PLAYING=false;
    var btn=document.getElementById('paBtn');
    if(btn)btn.textContent='🔊 전체 대화 듣기';
    return;
  }
  window.speechSynthesis.cancel();
  PLAYING=true;
  var btn=document.getElementById('paBtn');
  if(btn)btn.textContent='⏹ 재생 중... (탭하면 정지)';
  var i=0;
  function next(){
    if(i>=lines.length||!PLAYING){
      PLAYING=false;
      var b=document.getElementById('paBtn');
      if(b)b.textContent='🔊 전체 대화 듣기';
      return;
    }
    var item=lines[i];
    var text=(typeof item==='string')?item:item.text;
    var itemLang=(typeof item==='string')?lang:(item.lang||lang);
    var u=new SpeechSynthesisUtterance(text);
    u.lang=itemLang;u.rate=(typeof item==='object'&&item.slow)?0.72:0.84;u.volume=1.0;
    var vs=window.speechSynthesis.getVoices();
    for(var j=0;j<vs.length;j++){if(vs[j].lang===itemLang){u.voice=vs[j];break;}}
    var myIndex=i;var advanced=false;
    function advance(){
      if(advanced)return;
      advanced=true;
      if(i===myIndex)i++;
      setTimeout(next,380);
    }
    u.onend=advance;
    u.onerror=advance;
    window.speechSynthesis.speak(u);
    var estMs=Math.max(2200,text.length*130);
    setTimeout(function(){if(!advanced&&PLAYING)advance();},estMs);
  }
  next();
}

function isOwned(id){return Object.values(GARDEN).some(function(arr){return Array.isArray(arr)&&arr.indexOf(id)>=0;});}
function buyGarden(id,cat,name,icon,price){

function getTodayVocab(){
  var day=new Date().getDay();
  var st=(day*7)%VOCAB.length;

}

function collectAllLines(scArr){

  (scArr||[]).forEach(function(item){

      (sc.lines||[]).forEach(function(line){
        if(line.en)out.push(line.en);
      });
    });
  });
  return out;
}
function collectAllLinesAnnounced(scArr){
  var out=[];
  (scArr||[]).forEach(function(item){
    var hasEnglish=(item.scripts||[]).some(function(sc){return (sc.lines||[]).some(function(l){return !!l.en;});});
    if(!hasEnglish)return;
    out.push({text:item.title.ko,lang:'ko-KR',slow:true});
    (item.scripts||[]).forEach(function(sc){
      (sc.lines||[]).forEach(function(line){
        if(line.en)out.push({text:line.en,lang:'en-US'});
      });
    });
  });
  return out;
}

// mode,id,title_ko,title_en,icon,color,bg,country,lang,script_label_ko,script_label_en,tip_ko,tip_en,role,en,ko,jp,ro
function parseCSV(text){
  var rows=[],field='',row=[],inQ=false,i=0;
  while(i<text.length){
    var c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i+=2;} else {inQ=false;i++;} }
      else{field+=c;i++;}
    }else{
      if(c==='"'){inQ=true;i++;}
      else if(c===','){row.push(field);field='';i++;}
      else if(c==='\r'){i++;}
      else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';i++;}
      else{field+=c;i++;}
    }
  }
  if(field.length>0||row.length>0){row.push(field);rows.push(row);}
  return rows;
}
function csvToObjects(text){
  var rows=parseCSV(text);
  if(rows.length<2)return[];
  var headers=rows[0].map(function(h){return h.trim();});
  var out=[];
  for(var r=1;r<rows.length;r++){
    if(rows[r].length===0||(rows[r].length===1&&rows[r][0].trim()===''))continue;
    var obj={};
    headers.forEach(function(h,idx){obj[h]=(rows[r][idx]||'').trim();});
    out.push(obj);
  }
  return out;
}
function buildScenariosFromRows(rows,modeFilter){
  var byId={},order=[];
  rows.filter(function(r){return r.mode===modeFilter&&r.id;}).forEach(function(r){
    if(!byId[r.id]){
      byId[r.id]={id:r.id,icon:r.icon||'💬',color:r.color||'#7A5AAA',bg:r.bg||'#FFFFFF',
        title:{ko:r.title_ko||r.id,en:r.title_en||r.id},
        country:r.country||'전체',lang:r.lang||'',
        scriptsMap:{},scriptOrder:[]};
      order.push(r.id);
    }
    var item=byId[r.id];
    var slabel=r.script_label_ko||'대화';
    if(!item.scriptsMap[slabel]){
      item.scriptsMap[slabel]={label:{ko:slabel,en:r.script_label_en||slabel},tip:{ko:r.tip_ko||'',en:r.tip_en||''},lines:[]};
      item.scriptOrder.push(slabel);
    }
    var line=(item.lang==='ja')?{jp:r.jp||r.en,ro:r.ro||'',ko:r.ko||''}:{r:r.role||'n',en:r.en||'',ko:r.ko||''};
    item.scriptsMap[slabel].lines.push(line);
  });
  return order.map(function(id){
    var it=byId[id];
    var out={id:it.id,icon:it.icon,color:it.color,bg:it.bg,title:it.title,scripts:it.scriptOrder.map(function(sl){return it.scriptsMap[sl];})};
    if(modeFilter==='travel'){out.country=it.country;if(it.lang)out.lang=it.lang;}
    return out;
  });
}
function buildLeaderFromRows(rows){
  var byId={},order=[];
  rows.filter(function(r){return r.mode==='leader'&&r.id;}).forEach(function(r){
    if(!byId[r.id]){
      byId[r.id]={id:r.id,icon:r.icon||'🚑',color:r.color||'#8A5A22',bg:r.bg||'#FBF4E8',
        title:r.title_ko||r.id,desc:'',steps:[],warn:[],say:[]};
      order.push(r.id);
    }
    var item=byId[r.id];
    if(r.tip_ko&&!item.desc)item.desc=r.tip_ko;
    var content=r.ko||r.en||'';
    if(!content)return;
    if(r.role==='warn')item.warn.push(content);
    else if(r.role==='say')item.say.push(content);
    else item.steps.push(content);
  });
  return order.map(function(id){return byId[id];});
}
var TRAVEL_GROUP_ORDER=['t_checkin','t_security','t_immigration','t_customs','t_flight','t_airport_counter','t_baggage','t_hotelin','t_hotelout','t_complaint','t_reserve','t_order','t_pay','t_cafe','t_restaurant','t_shopping','t_refund','t_shopping_ex','t_taxi','t_subway','t_directions','t_transit','t_sightseeing','t_photo','t_tour','t_theft','t_sick','t_lost','t_jp_greeting','t_jp_restaurant','t_uk_tips','t_no_tips','t_immigration_ex'];

function gardenPreview(){
  var items=[];
  var allIds=Object.values(GARDEN).filter(Array.isArray).reduce(function(a,b){return a.concat(b);});
  allIds.forEach(function(id){
    var item=GARDEN_SHOP.find(function(x){return x.id===id;});
    if(item)items.push(item.icon);
  });
  if(items.length===0)return '<div style="font-size:24px;color:#CCC;padding:8px 0;">🌿 출석하면 정원이 자라나요!</div>';
  var disp=items.slice(0,12);
  return '<div style="font-size:24px;letter-spacing:3px;min-height:36px;">'+disp.join('')+'</div>';
}

        var isN=line.r==='n';
        html+='<div style="display:flex;flex-direction:'+(isN?'row':'row-reverse')+';margin-bottom:10px;align-items:flex-end;gap:8px;">'+
          '<span style="font-size:18px;flex-shrink:0;">'+(isN?'🧑‍💼':'🧳')+'</span>'+
          '<div style="background:'+(isN?s.color+'18':'white')+';border:1.5px solid '+(isN?s.color+'50':'#DDD')+';border-radius:'+(isN?'4px 14px 14px 14px':'14px 4px 14px 14px')+';padding:9px 12px;max-width:84%;">'+
          '<div style="font-size:10px;color:'+(isN?s.color:'#AAA')+';font-weight:700;margin-bottom:2px;">'+(isN?'Local/Staff 🧑‍💼':'Traveler 🧳')+'</div>'+
          '<div style="font-size:14px;color:#1A1A1A;line-height:1.55;font-weight:600;">'+line.en+'</div>'+
          '<div style="font-size:12px;color:#888;margin-top:3px;">'+line.ko+'</div>'+
          '<button onclick="spk(\''+line.en.replace(/\'/g,"\\'")+'\');" style="margin-top:7px;background:'+s.color+';border:none;border-radius:10px;padding:4px 12px;color:white;font-size:11px;font-weight:700;">🔊 듣기</button>'+
          '</div></div>';
      }
    });
    html+='<div style="background:#FFFCEE;border:2px solid #F0D850;border-radius:12px;padding:11px;margin-top:4px;display:flex;gap:8px;">'+
      '<span>💡</span><div><div style="font-size:11px;font-weight:800;color:#9A7800;margin-bottom:2px;">TIP</div>'+
      '<div style="font-size:12px;color:#7A5800;line-height:1.6;">'+sc2.tip.ko+'</div></div></div>';
    var enLines=isJa?sc2.lines.map(function(l){return l.jp;}):sc2.lines.map(function(l){return l.en;});
    PLAY_LINES=enLines;
    html+='<button id="paBtn" onclick="playAll(PLAY_LINES,\''+(isJa?'ja-JP':'en-US')+'\')" style="width:100%;margin-top:12px;background:linear-gradient(135deg,'+TC.a+','+TC.b+');border:none;border-radius:14px;padding:13px;color:white;font-size:14px;font-weight:800;">🔊 전체 대화 듣기</button>';
    html+='<button onclick="TRAVEL_ITEM=null;render(travelHTML());" style="width:100%;margin-top:8px;background:white;border:2px solid '+TC.a+'40;border-radius:12px;padding:10px;color:'+TC.a+';font-size:13px;font-weight:700;">← 목록으로</button>';
    return html;
  }

  // QUICK PHRASES
  if(TRAVEL_TAB==='quick'){
    var html='<div style="font-size:14px;font-weight:800;color:'+TC.a+';margin-bottom:12px;">⚡ 여행 빠른 표현</div>';
    TRAVEL_QUICK.forEach(function(section){
      html+='<div style="font-size:12px;font-weight:800;color:'+TC.a+';margin:10px 0 7px;">'+section.section+'</div>';
      section.items.forEach(function(p){
        html+='<div style="background:white;border-radius:12px;padding:10px 12px;margin-bottom:7px;border:1.5px solid #E8D8C0;display:flex;align-items:center;justify-content:space-between;">'+
          '<div style="flex:1;"><div style="font-size:12px;color:#888;margin-bottom:2px;">'+p.ko+'</div>'+
          '<div style="font-size:13px;font-weight:700;color:#222;">'+p.en+'</div></div>'+
          '<button onclick="spk(\''+p.en.replace(/\'/g,"\\'")+'\')" style="background:'+TC.a+';border:none;border-radius:10px;padding:7px 12px;color:white;font-size:13px;flex-shrink:0;margin-left:8px;font-weight:700;">🔊</button></div>';
      });
    });
    return html;
  }

  // COMMUNITY (shared with main app)
  if(TRAVEL_TAB==='community'){
    var html='<div style="font-size:14px;font-weight:800;color:'+TC.a+';margin-bottom:4px;">💬 익명 커뮤니티</div>'+
      '<div style="font-size:11px;color:#AAA;margin-bottom:12px;">욕설·비방 시 신고로 삭제됩니다.</div>';
    if(!LNAME){
      html+='<div style="background:white;border-radius:14px;padding:14px;margin-bottom:14px;border:2px solid #E8D8C0;">'+
        '<div style="font-size:13px;font-weight:700;margin-bottom:8px;">닉네임 설정</div>'+
        '<div style="display:flex;gap:8px;"><input id="ni" placeholder="닉네임 입력" style="flex:1;padding:8px 12px;border-radius:10px;border:1.5px solid #DDD;font-size:13px;outline:none;"/>'+
        '<button onclick="setName();render(travelHTML());" style="background:'+TC.a+';border:none;border-radius:10px;padding:8px 14px;color:white;font-weight:700;font-size:13px;">입장</button></div></div>';
    }else{
      html+='<div style="background:'+TC.a+'15;border-radius:12px;padding:10px 14px;margin-bottom:12px;border:1.5px solid '+TC.a+'40;display:flex;justify-content:space-between;align-items:center;">'+
        '<span style="font-size:13px;font-weight:600;color:'+TC.b+';">👤 '+LNAME+'</span>'+
        '<button onclick="LNAME=\'\';sv();render(travelHTML());" style="background:none;border:none;color:#AAA;font-size:12px;">나가기</button></div>'+
        '<div style="background:white;border-radius:14px;padding:13px;margin-bottom:12px;border:2px solid #E8D8C0;">'+
        '<textarea id="pta" placeholder="여행 팁이나 경험을 공유해보세요 😊" rows="3" style="width:100%;padding:9px;border-radius:10px;border:1.5px solid #DDD;font-size:13px;resize:none;outline:none;"></textarea>'+
        '<button onclick="submitPost();render(travelHTML());" style="width:100%;margin-top:8px;background:linear-gradient(135deg,'+TC.a+','+TC.b+');border:none;border-radius:10px;padding:10px;color:white;font-weight:700;font-size:13px;">게시하기</button></div>';
    }
    POSTS_DATA.forEach(function(post){
      html+='<div style="background:white;border-radius:14px;padding:13px;margin-bottom:10px;border:1.5px solid #E8D8C0;">'+
        '<div style="display:flex;justify-content:space-between;margin-bottom:7px;">'+
        '<span style="font-size:13px;font-weight:700;color:#444;">'+post.user+'</span>'+
        '<span style="font-size:11px;color:#BBB;">'+post.time+'</span></div>'+
        '<div style="font-size:14px;color:#333;line-height:1.55;margin-bottom:9px;">'+post.text+'</div>'+
        '<div style="display:flex;gap:8px;">'+
        '<button onclick="likePost('+post.id+');render(travelHTML());" style="background:#F5F0EA;border:none;border-radius:10px;padding:5px 12px;font-size:12px;">❤️ '+post.likes+'</button>'+
        '<button onclick="reportPost('+post.id+');render(travelHTML());" style="background:#FFF0F0;border:1px solid #FFB8B8;border-radius:10px;padding:5px 12px;font-size:12px;color:#CC4444;">🚨 신고</button>'+
        '</div></div>';
    });
    return html;
  }

  return '';
}

// ═══════════════════════════
// ACTIONS
// ═══════════════════════════
function selItem(id){
  var list=sc();
  for(var i=0;i<list.length;i++){if(list[i].id===id){ITEM=list[i];SCRIPT=0;render(modeHTML());return;}}
}
function doAttend(){
  if(ATTENDED)return;
  ATTENDED=true;
  try{localStorage.setItem('attDate',new Date().toDateString());}catch(e){}
  STREAK++;
  var bonus=STREAK%7===0?30:0;
  addPts(10+bonus);sv();
  if(bonus>0){MSG='🎉 7일 연속! +'+(10+bonus)+'pts!';MSGTYPE='ok';}
  else{MSG='✅ 출석 완료! +10pts';MSGTYPE='ok';}
  render(modeHTML());setTimeout(function(){MSG='';render(modeHTML());},2500);
}
function setName(){var v=document.getElementById('ni');if(v&&v.value.trim()){LNAME=v.value.trim();sv();render(modeHTML());}}
function submitPost(){
  var ta=document.getElementById('pta');
  if(!ta||!ta.value.trim()||!LNAME)return;
  var an=['🐰','🐻','🦊','🐼','🐨'];
  POSTS_DATA.unshift({id:Date.now(),user:'익명'+an[Math.floor(Math.random()*an.length)],time:'방금 전',text:ta.value,likes:0});
  sv();render(modeHTML());
}
function likePost(id){for(var i=0;i<POSTS_DATA.length;i++){if(POSTS_DATA[i].id===id){POSTS_DATA[i].likes++;break;}}sv();render(modeHTML());}
function reportPost(id){if(confirm('이 게시글을 신고할까요?')){POSTS_DATA=POSTS_DATA.filter(function(p){return p.id!==id;});sv();render(modeHTML());}}
function requestNotif(){
  if(!('Notification' in window)){alert('이 브라우저는 알림을 지원하지 않아요. Chrome을 사용해 주세요!');return;}
  Notification.requestPermission().then(function(p){
    if(p==='granted'){
      var tv=getTodayVocab();
      new Notification('🏥 Medical English',{body:'오늘의 단어: '+tv[0].en+' = '+tv[0].ko});
      showMsg('✅ 알림이 허용됐어요! 매일 단어 알림을 받을 수 있어요.','ok');
    }else{showMsg('알림 권한이 거부됐어요. 브라우저 설정에서 허용해 주세요.','err');}
  });
}

// ── PASSWORD LOCK (서버 검증) ────────────
var PW_ERR=''; var PW_CHECKING=false;
function checkLock(){
  PW_CHECKING=true;
  render('<div style="min-height:100vh;background:linear-gradient(160deg,#F0E8FF,#E8F0FF);display:flex;align-items:center;justify-content:center;"><div style="font-size:14px;color:#7A5AAA;font-weight:700;">불러오는 중...</div></div>');
  fetch('/api/check').then(function(res){
    PW_CHECKING=false;
    if(res.ok){render(homeHTML());loadSheetData(false);}
    else{SCREEN='lock';PW_ERR='';render(lockHTML());}
  }).catch(function(){
    PW_CHECKING=false;
    SCREEN='lock';PW_ERR='⚠️ 서버 연결 실패. 잠시 후 다시 시도해주세요.';render(lockHTML());
  });
}
function lockHTML(){
  return '<div style="min-height:100vh;background:linear-gradient(160deg,#F0E8FF,#E8F0FF);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;">'+
    '<div style="font-size:48px;margin-bottom:10px;">🏥</div>'+
    '<div style="font-size:17px;font-weight:800;color:#3A2A6A;margin-bottom:16px;">Medical English Pro</div>'+
    '<input id="pwIn" type="password" inputmode="text" maxlength="40" placeholder="비밀번호 입력" style="width:100%;max-width:280px;padding:14px;border-radius:12px;border:1.5px solid #DDD;font-size:18px;margin-bottom:10px;outline:none;text-align:center;" onkeydown="if(event.key===\'Enter\')submitLockPw();"/>'+
    (PW_ERR?'<div style="color:#CC3333;font-size:12px;margin-bottom:10px;">'+PW_ERR+'</div>':'')+
    '<button id="pwSubmitBtn" onclick="submitLockPw()" style="width:100%;max-width:280px;background:linear-gradient(135deg,#7A5AAA,#5A3A8A);border:none;border-radius:12px;padding:12px;color:white;font-weight:800;font-size:14px;">'+(PW_CHECKING?'확인 중...':'입장하기')+'</button>'+
    '</div>';
}
function submitLockPw(){
  var v=document.getElementById('pwIn').value;
  if(!v){PW_ERR='비밀번호를 입력해주세요.';render(lockHTML());return;}
  PW_CHECKING=true;render(lockHTML());
  fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:v})})
    .then(function(res){return res.json().then(function(data){return {ok:res.ok,data:data};});})
    .then(function(r){
      PW_CHECKING=false;
      if(r.ok&&r.data&&r.data.success){
        render(homeHTML());loadSheetData(false);
      }else{
        PW_ERR='비밀번호가 틀렸어요.';render(lockHTML());
      }
    }).catch(function(){
      PW_CHECKING=false;
      PW_ERR='⚠️ 서버 연결 실패. 잠시 후 다시 시도해주세요.';render(lockHTML());
    });
}
function logoutApp(){
  if(!confirm('로그아웃할까요? 다음에 열 때 비밀번호를 다시 입력해야 해요.'))return;
  fetch('/api/logout',{method:'POST'}).then(function(){
    SCREEN='lock';PW_ERR='';render(lockHTML());
  }).catch(function(){
    SCREEN='lock';PW_ERR='';render(lockHTML());
  });
}

window.onload=function(){
  if(window.speechSynthesis){
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};
  }
  checkLock();
};
